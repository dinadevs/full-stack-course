<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css" />
    <title>Shopping list</title>
  </head>

  <body>
    <main class="container">
      <img src="assests/icons/logo.svg" alt="">
      <a href="#" class="back"> ← <strong>Back</strong> </a>

      <h1>Shopping of the week</h1>

      <form id="shoppingForm">
        <div class="add-items">
          <input type="text" id="itemInput" placeholder="Adicionar novo item" />
          <button type="submit" id="addBtn">Add item</button>
        </div>
      </form>

      <ul id="listItems"></ul>
      <div id="emptyState" class="empty-state">
        <img src="assets/icons/empty.svg" alt="empty list" />
        <p>Empty list</p>
      </div>

      <div class="toast" id="toast">
        <img src="assests/icons/circle.svg" alt="" />
        <span>The item has been removed from the list.</span>
        <button id="closeToast">
          <img src="assets/icons/delete.svg" alt="" />
        </button>
        <img src="assests/empty.png3" alt="">
      </div>
    </main>

    <script src="script.js"></script>
  </body>
</html>
